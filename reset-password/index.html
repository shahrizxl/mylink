<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
    <style>
      body { font-family: system-ui; max-width: 520px; margin: 60px auto; padding: 16px; text-align: center; }
      button { padding: 12px 18px; font-size: 16px; cursor: pointer; }
      .small { margin-top: 14px; font-size: 13px; opacity: .7; word-break: break-all; }
    </style>
  </head>
  <body>
    <h2>Opening SmartBudget…</h2>
    <p>If the app didn’t open automatically, tap the button below.</p>

    <button id="openBtn">Open the app</button>

    <div class="small" id="debug"></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      // ✅ CHANGE THIS to your real scheme/package
      const scheme = "com.example.smartbudget";
      const appUrl = code
        ? `${scheme}://reset-password?code=${encodeURIComponent(code)}`
        : `${scheme}://reset-password`;

      document.getElementById("debug").textContent = "Deep link: " + appUrl;

      document.getElementById("openBtn").addEventListener("click", () => {
        window.location.href = appUrl;
      });

      // Try auto-open after render (so page isn't blank)
      setTimeout(() => {
        window.location.href = appUrl;
      }, 400);
    </script>
  </body>
</html>
