<script>
  const params = new URLSearchParams(window.location.search);

  // Supabase gives ?code=... (PKCE)
  const code = params.get("code") || "";

  // ✅ Add type=recovery (important)
  const type = params.get("type") || "recovery";

  document.getElementById("codeText").textContent = code || "(no code)";

  // ✅ Forward BOTH code + type to the app
  const deepLink =
    "com.example.smartbudget://reset-password?code=" +
    encodeURIComponent(code) +
    "&type=" +
    encodeURIComponent(type);

  function openApp() {
    window.location.href = deepLink;
  }

  document.getElementById("openBtn").addEventListener("click", openApp);

  // Auto-try once (button is backup)
  setTimeout(openApp, 300);
</script>
