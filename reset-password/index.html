<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password</title>

  <style>
    body {
      font-family: system-ui;
      max-width: 520px;
      margin: 60px auto;
      padding: 16px;
      text-align: center;
    }
    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    .small {
      margin-top: 14px;
      font-size: 13px;
      opacity: .7;
      word-break: break-all;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h2>Opening SmartBudget…</h2>
  <p>If the app didn’t open automatically, tap the button below.</p>

  <button id="openBtn">Open the app</button>

  <div class="small" id="debug"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    // MUST match Android applicationId
    const scheme = "com.example.smartbudget";

    // ✅ Use PATH style (most compatible)
    const appUrl = code
      ? `${scheme}:///reset-password?code=${encodeURIComponent(code)}`
      : `${scheme}:///reset-password`;

    // ✅ Android intent fallback using PATH style too
    const intentUrl = code
      ? `intent:///reset-password?code=${encodeURIComponent(code)}#Intent;scheme=${scheme};package=${scheme};end`
      : `intent:///reset-password#Intent;scheme=${scheme};package=${scheme};end`;

    const debug = document.getElementById("debug");
    debug.textContent =
      "Custom scheme:\n" + appUrl +
      "\n\nAndroid intent:\n" + intentUrl;

    function openApp() {
      // 1) Try custom scheme
      window.location.href = appUrl;

      // 2) Try Android intent fallback
      setTimeout(() => {
        window.location.href = intentUrl;
      }, 300);
    }

    document.getElementById("openBtn").addEventListener("click", openApp);

    // Auto attempt after render
    setTimeout(openApp, 500);
  </script>
</body>
</html>
